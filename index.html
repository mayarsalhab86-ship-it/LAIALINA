<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العفوية تتصل بك</title>
    <style>
        /* تنسيق خلفية الصفحة */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000; /* خلفية سوداء لإبراز الصورة */
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* تنسيق الحاوية والصورة */
        .container {
            text-align: center;
            width: 100%;
            max-width: 800px; /* تحكم في كبر الصورة من هنا */
        }

        img {
            width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: pulse 2s infinite; /* إضافة حركة بسيطة (اختياري) */
        }

        /* تأثير نبض خفيف للصورة */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* زر تشغيل الصوت في حال لم يعمل تلقائياً */
        .audio-controls {
            position: absolute;
            bottom: 20px;
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="1000325376.jpg" alt="العفوية تتصل بك">
    </div>

    <audio id="bgMusic" autoplay loop>
        <source src="✨ العفوية تتصل بك✨(M4A_128K).m4a" type="audio/mp4">
        متصفحك لا يدعم تشغيل الصوت.
    </audio>

    <script>
        // محاولة تشغيل الصوت تلقائياً عند الضغط في أي مكان (لأن المتصفحات تمنع الصوت التلقائي)
        document.body.addEventListener('click', function() {
            var audio = document.getElementById('bgMusic');
            audio.play();
        }, { once: true });
    </script>

</body>
</html>
