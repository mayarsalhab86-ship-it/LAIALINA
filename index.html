<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محاكي إنفاق مليارير</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .header { background: #f39c12; color: black; padding: 20px; position: sticky; top: 0; font-size: 2.5em; z-index: 100; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-weight: bold; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .item { background: #2c3e50; padding: 20px; border-radius: 15px; border: 1px solid #444; transition: 0.3s; }
        .item:hover { transform: translateY(-5px); border-color: #f39c12; }
        .item h3 { font-size: 1.2em; margin-bottom: 10px; color: #ecf0f1; }
        .item p { color: #2ecc71; font-size: 1.3em; font-weight: bold; margin-bottom: 15px; }
        button { background: #e74c3c; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 1em; width: 100%; }
        button:hover { background: #c0392b; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="header">
        الرصيد المتبقي: $<span id="balance">817,000,000,000</span>
    </div>

    <div class="container" id="items-container">
        </div>

    <script>
        let balance = 817000000000;
        const items = [
            // أجهزة آبل
            { name: "iPhone 17 Pro Max (1TB)", price: 1600 },
            { name: "iPad Pro M4 (Full Specs)", price: 2500 },
            { name: "MacBook Pro M3 Max", price: 5000 },
            { name: "Apple Vision Pro", price: 3500 },
            
            // كروت شاشة وهاردوير
            { name: "NVIDIA RTX 5090 (نسخة 2026)", price: 2500 },
            { name: "NVIDIA Quadro RTX 8000", price: 10000 },
            { name: "سيرفر ذكاء اصطناعي كامل", price: 250000 },
            
            // سيارات عادية وفارهة
            { name: "Tesla Model S Plaid", price: 90000 },
            { name: "Tesla Cybertruck", price: 100000 },
            { name: "Lucid Air Sapphire", price: 250000 },
            { name: "Range Rover SV", price: 220000 },
            { name: "Mercedes G-Wagon (G63)", price: 180000 },
            
            // سيارات خارقة (Supercars)
            { name: "Lamborghini Revuelto", price: 600000 },
            { name: "Ferrari Purosangue", price: 400000 },
            { name: "Bugatti Chiron", price: 3000000 },
            { name: "Koenigsegg Jesko", price: 4000000 },
            { name: "Pagani Huayra", price: 3500000 },
            
            // طائرات ويخوت
            { name: "طائرة Private Jet (Gulfstream)", price: 75000000 },
            { name: "طائرة إيرباص خاصّة", price: 250000000 },
            { name: "يخت ضخم (Mega Yacht)", price: 500000000 },
            { name: "غواصة استكشاف أعماق", price: 2000000 },
            
            // أشياء خيالية
            { name: "جزيرة خاصّة في الكاريبي", price: 100000000 },
            { name: "ناطحة سحاب في نيويورك", price: 1500000000 },
            { name: "فريق NBA (كرة سلة)", price: 3000000000 },
            { name: "قاعدة فضائية مصغرة", price: 15000000000 },
            { name: "مدينة ملاهي خاصة", price: 500000000 }
        ];

        const container = document.getElementById('items-container');
        const balanceEl = document.getElementById('balance');

        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <h3>${item.name}</h3>
                <p>$${item.price.toLocaleString()}</p>
                <button onclick="buy(${item.price})">اشتري الآن</button>
            `;
            container.appendChild(div);
        });

        function buy(price) {
            if (balance >= price) {
                balance -= price;
                balanceEl.innerText = balance.toLocaleString();
            } else {
                alert("للأسف.. خلصت فلوس إيلون! صرت أفقر منه الآن.");
            }
        }
    </script>
</body>
</html>
