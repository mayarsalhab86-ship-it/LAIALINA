<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية الإنفاق | Spending Empire</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
            --accent: #c5a028;
            --text-gray: #a0a0a0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        /* الهيدر الفخم */
        .header {
            background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
            padding: 25px 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            text-align: center;
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .header h1 {
            font-size: 1.2rem;
            color: var(--gold);
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .balance-container {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .balance-container span { color: var(--gold); }

        /* حاوية المنتجات */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* كرت المنتج */
        .item-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
        }

        .item-card:active { transform: scale(0.95); }

        .item-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            filter: grayscale(20%);
        }

        .item-info {
            padding: 12px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .item-info h3 {
            font-size: 0.95rem;
            margin: 0 0 8px 0;
            color: #efefef;
        }

        .item-price {
            color: var(--gold);
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 12px;
        }

        /* أزرار الشراء */
        .buy-btn {
            background: linear-gradient(45deg, #b8860b, #d4af37);
            color: black;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        /* إعدادات الموبايل */
        @media (max-width: 480px) {
            .container { grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
            .balance-container { font-size: 1.6rem; }
            .header h1 { font-size: 0.9rem; }
            .item-card img { height: 110px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>خزينة الملياردير | Fortune</h1>
        <div class="balance-container">$<span id="balance">817,000,000,000</span></div>
    </div>

    <div class="container" id="main-grid"></div>

    <script>
        let balance = 817000000000;
        
        const items = [
            // تكنولوجيا
            { name: "iPhone 17 Pro", price: 1600, img: "https://images.unsplash.com/photo-1678911820864-e2c567c655d7?w=400" },
            { name: "RTX 5090 GPU", price: 3000, img: "https://images.unsplash.com/photo-1591488320449-011701bb6704?w=400" },
            { name: "AI Server Rack", price: 250000, img: "https://images.unsplash.com/photo-1558494949-ef010cbdcc51?w=400" },
            
            // سيارات
            { name: "كيا سبورتيج", price: 35000, img: "https://images.unsplash.com/photo-1630514930696-61690184457e?w=400" },
            { name: "هوندا سيفيك Type R", price: 45000, img: "https://images.unsplash.com/photo-1594070319944-7c0c63146b7a?w=400" },
            { name: "مرسيدس G-Wagon", price: 250000, img: "https://images.unsplash.com/photo-1520031441872-265e4ff70366?w=400" },
            { name: "بوغاتي شيرون", price: 3500000, img: "https://images.unsplash.com/photo-1627454819213-f7724a697ce7?w=400" },
            
            // عسكري وفضاء
            { name: "دبابة M1 Abrams", price: 10000000, img: "https://images.unsplash.com/photo-1599054702511-37d74597d265?w=400" },
            { name: "مقاتلة F-35", price: 100000000, img: "https://images.unsplash.com/photo-1560037810-74403366f91e?w=400" },
            { name: "صاروخ Falcon 9", price: 65000000, img: "https://images.unsplash.com/photo-1517976487492-5750f3195933?w=400" },
            
            // فخامة مطلقة
            { name: "يخت ملكي", price: 450000000, img: "https://images.unsplash.com/photo-1567899378494-47b22a2ae96a?w=400" },
            { name: "طائرة Gulfstream", price: 75000000, img: "https://images.unsplash.com/photo-1540962351504-03099e0a754b?w=400" },
            { name: "جزيرة خاصة", price: 120000000, img: "https://images.unsplash.com/photo-1559128010-7c1ad6e1b6a5?w=400" },
            { name: "ناطحة سحاب", price: 2500000000, img: "https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=400" },
            { name: "بسكويت بالذهب", price: 500, img: "https://images.unsplash.com/photo-1558961363-fa8fdf82db35?w=400" }
        ];

        const grid = document.getElementById('main-grid');
        const balanceDisplay = document.getElementById('balance');

        function updateBalance() {
            balanceDisplay.innerText = balance.toLocaleString();
        }

        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `
                <img src="${item.img}" alt="${item.name}" loading="lazy">
                <div class="item-info">
                    <h3>${item.name}</h3>
                    <div class="item-price">$${item.price.toLocaleString()}</div>
                    <button class="buy-btn" onclick="buy(${item.price})">اقتناء الآن</button>
                </div>
            `;
            grid.appendChild(card);
        });

        function buy(price) {
            if (balance >= price) {
                balance -= price;
                updateBalance();
                // تأثير بسيط عند الشراء
                balanceDisplay.style.color = "#2ecc71";
                setTimeout(() => balanceDisplay.style.color = "#d4af37", 200);
            } else {
                alert("عذراً.. الرصيد غير كافٍ لهذه الرفاهية!");
            }
        }
    </script>
</body>
</html>
