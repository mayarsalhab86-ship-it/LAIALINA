<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختبار الميكروفون</title>
    <style>
        body { background: #1a1e2b; color: white; font-family: Arial; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            margin: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .mic-btn { background: #f44336; color: white; }
        .mic-btn.active { background: #4caf50; }
        .status { 
            padding: 20px; 
            background: #2d3349; 
            border-radius: 10px; 
            margin: 20px 0;
            text-align: center;
        }
        .error-box { 
            background: #ff4757; 
            padding: 15px; 
            border-radius: 5px; 
            margin: 10px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: gold;">🔊 اختبار الميكروفون</h1>
        
        <div style="text-align: center;">
            <button id="micBtn" class="mic-btn">🎤 اضغط لفتح الميكروفون</button>
        </div>

        <div class="status" id="status">
            <div id="micState">⏳ اضغط على الزر...</div>
            <div id="micDetails" style="color: #a0a8c0; margin-top: 10px;"></div>
        </div>

        <div class="error-box" id="errorBox">
            <strong>❌ خطأ:</strong> <span id="errorMsg"></span>
        </div>

        <div style="background: #2d3349; padding: 20px; border-radius: 10px;">
            <h3 style="color: gold;">📋 تعليمات التشخيص:</h3>
            <ol style="color: #a0a8c0; line-height: 2;">
                <li>🔴 اضغط على الزر الأحمر أعلاه</li>
                <li>✅ ستظهر نافذة إذن من المتصفح - اضغط "سماح"</li>
                <li>🎤 إذا ظهرت نافذة، الميكروفون يعمل</li>
                <li>⚠️ إذا لم تظهر، اتبع الحلول أدناه</li>
            </ol>
        </div>
    </div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const micState = document.getElementById('micState');
        const micDetails = document.getElementById('micDetails');
        const errorBox = document.getElementById('errorBox');
        const errorMsg = document.getElementById('errorMsg');

        let isMicOn = false;
        let stream = null;

        function showError(msg) {
            errorBox.style.display = 'block';
            errorMsg.textContent = msg;
        }

        micBtn.onclick = async () => {
            try {
                micState.textContent = '⏳ جاري طلب الميكروفون...';
                micDetails.textContent = 'انتظر قليلاً...';
                
                // محاولة فتح الميكروفون
                stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    } 
                });
                
                // نجاح
                isMicOn = true;
                micBtn.textContent = '🎤 الميكروفون مفتوح';
                micBtn.classList.add('active');
                micState.textContent = '✅ الميكروفون يعمل بنجاح';
                micDetails.textContent = 'يمكنك التحدث الآن - المستوى: ';
                errorBox.style.display = 'none';
                
                // عرض مستوى الصوت
                const audioContext = new AudioContext();
                const analyser = audioContext.createAnalyser();
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                
                function showVolume() {
                    const data = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(data);
                    let sum = 0;
                    for (let i = 0; i < data.length; i++) sum += data[i];
                    let avg = sum / data.length;
                    micDetails.textContent = 'مستوى الصوت: ' + '█'.repeat(Math.floor(avg / 10)) + ' ' + Math.floor(avg) + '%';
                    requestAnimationFrame(showVolume);
                }
                showVolume();
                
            } catch (err) {
                console.error('Microphone error:', err);
                
                if (err.name === 'NotAllowedError') {
                    showError('الميكروفون ممنوع - اذهب للإعدادات واسمح بالوصول');
                } else if (err.name === 'NotFoundError') {
                    showError('لا يوجد ميكروفون متصل بجهازك');
                } else if (err.name === 'NotReadableError') {
                    showError('الميكروفون مستخدم من تطبيق آخر');
                } else {
                    showError('خطأ غير معروف: ' + err.message);
                }
                
                micState.textContent = '❌ فشل فتح الميكروفون';
                micBtn.textContent = '🎤 حاول مرة أخرى';
            }
        };
    </script>
</body>
</html>
