<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول النوتة الموسيقية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Tahoma, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e2b4f, #2a1e4f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 30px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1e2b4f;
            font-size: 2.2em;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 3px dashed #4a2f8a;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            background: #edeaff;
            border-color: #6b4ebb;
        }
        .upload-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        #fileInput {
            display: none;
        }
        .file-info {
            background: #f0f4ff;
            padding: 15px 20px;
            border-radius: 12px;
            margin: 20px 0;
            display: none;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #4a2f8a30;
        }
        .file-name {
            font-weight: 600;
            color: #1e2b4f;
        }
        .file-size {
            color: #666;
            font-size: 0.9em;
            margin-right: 10px;
        }
        .remove-file {
            color: #dc3545;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 8px;
            font-weight: 600;
        }
        .remove-file:hover {
            background: #ffe6e6;
        }
        .controls {
            display: flex;
            gap: 20px;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        .control-group {
            flex: 1;
            min-width: 200px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        select, input[type=range] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
        }
        .convert-btn {
            background: linear-gradient(135deg, #1e2b4f, #4a2f8a);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin: 20px 0;
            transition: 0.3s;
        }
        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px #4a2f8a70;
        }
        .convert-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .result-area {
            background: #f8f9ff;
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
            display: none;
        }
        .loading {
            text-align: center;
            padding: 30px;
            display: none;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4a2f8a;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 محول النوتة الموسيقية</h1>
        <p class="subtitle">حوّل ملفات الصوت إلى تدوين موسيقي دقيق</p>

        <!-- منطقة الرفع -->
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">🎼</div>
            <div style="font-size: 1.2em; margin-bottom: 5px;">اضغط هنا أو اسحب ملف</div>
            <div style="color: #666;">MP3, WAV, MIDI, PDF (حتى 50 MB)</div>
        </div>
        
        <input type="file" id="fileInput" accept=".mp3,.wav,.mid,.midi,.pdf,.xml,.musicxml">

        <!-- معلومات الملف -->
        <div class="file-info" id="fileInfo">
            <div>
                <span class="file-name" id="fileName"></span>
                <span class="file-size" id="fileSize"></span>
            </div>
            <span class="remove-file" id="removeFile">✕ إزالة</span>
        </div>

        <!-- الإعدادات -->
        <div class="controls">
            <div class="control-group">
                <label>الآلة:</label>
                <select id="instrument">
                    <option value="piano">بيانو</option>
                    <option value="guitar">جيتار</option>
                    <option value="violin">كمان</option>
                </select>
            </div>
            <div class="control-group">
                <label>الدقة: <span id="accuracyLabel">96%</span></label>
                <input type="range" id="accuracy" min="50" max="100" value="96" step="1">
            </div>
        </div>

        <!-- زر التحويل -->
        <button class="convert-btn" id="convertBtn" disabled>🔄 بدء التحويل</button>

        <!-- التحميل -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>جاري التحليل والمعالجة...</p>
        </div>

        <!-- الأخطاء -->
        <div class="error-message" id="errorMessage"></div>

        <!-- النتيجة -->
        <div class="result-area" id="resultArea">
            <h3 style="margin-bottom: 15px;">✅ تم التحويل بنجاح</h3>
            <div style="background: white; padding: 20px; border-radius: 10px;">
                <div style="margin: 20px 0; font-size: 2em; text-align: center;">🎵 ♩ ♪ ♫</div>
                <div style="line-height: 2; color: #333;">
                    <div>• المفتاح: C الكبير</div>
                    <div>• الإيقاع: 4/4</div>
                    <div>• عدد النوتات: 45</div>
                    <div style="margin-top: 15px; padding: 10px; background: #f0f0f0; border-radius: 5px; direction: ltr;">
                        C4 E4 G4 C5 E5 G5 C6
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // انتظر تحميل الصفحة كاملة
        window.onload = function() {
            console.log('✅ الصفحة تحمّلت');
            
            // العناصر
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const fileInfo = document.getElementById('fileInfo');
            const fileName = document.getElementById('fileName');
            const fileSize = document.getElementById('fileSize');
            const removeFile = document.getElementById('removeFile');
            const convertBtn = document.getElementById('convertBtn');
            const loading = document.getElementById('loading');
            const resultArea = document.getElementById('resultArea');
            const errorMessage = document.getElementById('errorMessage');
            const accuracySlider = document.getElementById('accuracy');
            const accuracyLabel = document.getElementById('accuracyLabel');

            // 1. تحديث نسبة الدقة
            accuracySlider.oninput = function() {
                accuracyLabel.textContent = this.value + '%';
            };

            // 2. النقر على منطقة الرفع
            uploadArea.onclick = function() {
                console.log('👆 نقر على الرفع');
                fileInput.click();
            };

            // 3. منع السلوك الافتراضي للسحب
            uploadArea.ondragover = function(e) {
                e.preventDefault();
                this.style.background = '#edeaff';
            };

            uploadArea.ondragleave = function() {
                this.style.background = '#f8f9ff';
            };

            uploadArea.ondrop = function(e) {
                e.preventDefault();
                this.style.background = '#f8f9ff';
                
                if (e.dataTransfer.files.length > 0) {
                    console.log('📁 ملف مسحوب:', e.dataTransfer.files[0].name);
                    fileInput.files = e.dataTransfer.files;
                    handleFileSelect(e.dataTransfer.files[0]);
                }
            };

            // 4. عند اختيار ملف
            fileInput.onchange = function() {
                if (this.files.length > 0) {
                    console.log('📁 ملف مختار:', this.files[0].name);
                    handleFileSelect(this.files[0]);
                }
            };

            // 5. دالة معالجة الملف
            function handleFileSelect(file) {
                // التحقق من الحجم
                if (file.size > 50 * 1024 * 1024) {
                    showError('الملف كبير جداً (الحد الأقصى 50 ميجابايت)');
                    return;
                }

                // التحقق من الصيغة
                const ext = file.name.split('.').pop().toLowerCase();
                const allowed = ['mp3', 'wav', 'mid', 'midi', 'pdf', 'xml', 'musicxml'];
                
                if (!allowed.includes(ext)) {
                    showError('صيغة الملف غير مدعومة');
                    return;
                }

                // عرض معلومات الملف
                fileName.textContent = file.name;
                fileSize.textContent = `(${(file.size / 1024).toFixed(1)} KB)`;
                fileInfo.style.display = 'flex';
                convertBtn.disabled = false;
                errorMessage.style.display = 'none';
                
                console.log('✅ ملف مقبول:', file.name);
            }

            // 6. إزالة الملف
            removeFile.onclick = function() {
                fileInput.value = '';
                fileInfo.style.display = 'none';
                convertBtn.disabled = true;
                resultArea.style.display = 'none';
                console.log('🗑️ تم إزالة الملف');
            };

            // 7. عرض الأخطاء
            function showError(msg) {
                errorMessage.textContent = msg;
                errorMessage.style.display = 'block';
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 3000);
            }

            // 8. زر التحويل
            convertBtn.onclick = function() {
                console.log('🔄 بدأ التحويل');
                
                // إخفاء النتيجة السابقة
                resultArea.style.display = 'none';
                
                // إظهار التحميل
                loading.style.display = 'block';
                convertBtn.disabled = true;
                
                // محاكاة عملية التحويل
                setTimeout(() => {
                    loading.style.display = 'none';
                    resultArea.style.display = 'block';
                    convertBtn.disabled = false;
                    console.log('✅ تم التحويل');
                }, 2000);
            };

            // 9. اختبار سريع
            console.log('🚀 الموقع جاهز');
        };
    </script>
</body>
</html>
