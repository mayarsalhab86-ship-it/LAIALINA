<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة معالجة الصور المتكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #7c3aed;
            --bg: #0f172a;
            --card: #1e293b;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #334155;
            margin-bottom: 30px;
        }

        .upload-zone {
            border: 2px dashed #475569;
            padding: 40px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            background: #0f172a;
        }

        .upload-zone:hover { border-color: var(--primary); background: #1e293b; }

        input[type="file"] { display: none; }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: 0.3s;
        }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4); }

        .preview-img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        /* ميزة الخلفية الشفافة (فلتر متقدم) */
        .transparent-mode { filter: drop-shadow(0 0 0 white); background: none !important; }

        .output-box {
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: left;
            display: none;
        }

        textarea {
            width: 100%;
            height: 50px;
            background: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            resize: none;
        }

        .video-section { margin-top: 50px; }
        iframe { border-radius: 15px; border: 2px solid #334155; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>📸 محول الصور الخارق</h1>
        <p>حول صورك إلى روابط، أكواد HTML، أو اجعلها شفافة</p>

        <label for="imageInput" class="upload-zone" id="dropZone">
            <div id="textLabel">اسحب الصورة هنا أو اضغط للرفع</div>
            <img id="mainPreview" class="preview-img" src="" alt="preview">
            <input type="file" id="imageInput" accept="image/*">
        </label>

        <div id="controls" style="margin-top: 20px; display: none;">
            <button class="btn" onclick="uploadAndGetLink()">🔗 الحصول على رابط</button>
            <button class="btn" onclick="makeTransparent()" style="background: #059669;">✨ جعلها شفافة</button>
        </div>

        <div id="loader" style="display: none; color: #fbbf24; margin-top: 15px;">جاري المعالجة... ⏳</div>

        <div id="outputArea" class="output-box">
            <label style="color: white; font-weight: bold;">الرابط المباشر:</label>
            <textarea id="urlOutput" readonly></textarea>
            
            <label style="color: white; font-weight: bold; margin-top: 10px; display: block;">كود HTML:</label>
            <textarea id="htmlOutput" readonly></textarea>
            <button class="btn" style="width: 100%; margin-top: 10px;" onclick="copyAll()">نسخ النتائج ✅</button>
        </div>
    </div>

    <div class="video-section">
        <h2>🎥 فيديوهات تعليمية</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <iframe width="100%" height="200" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="شرح الرفع" frameborder="0" allowfullscreen></iframe>
            <iframe width="100%" height="200" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="شرح الشفافية" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>
</div>

<script>
    const input = document.getElementById('imageInput');
    const preview = document.getElementById('mainPreview');
    const controls = document.getElementById('controls');
    const loader = document.getElementById('loader');
    const outputArea = document.getElementById('outputArea');

    // مفتاح API مجاني (ImgBB) - يفضل عمل حساب ووضع مفتاحك الخاص
    const API_KEY = '70135c364c679a95725832a2468305f8'; 

    input.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'inline-block';
            document.getElementById('textLabel').style.display = 'none';
            controls.style.display = 'block';
            outputArea.style.display = 'none';
        }
    };

    async function uploadAndGetLink() {
        const file = input.files[0];
        loader.style.display = 'block';
        
        const formData = new FormData();
        formData.append('image', file);

        try {
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            
            if(data.success) {
                const link = data.data.url;
                document.getElementById('urlOutput').value = link;
                document.getElementById('htmlOutput').value = `<img src="${link}" alt="image">`;
                outputArea.style.display = 'block';
            }
        } catch (err) {
            alert('حدث خطأ في الرفع!');
        } finally {
            loader.style.display = 'none';
        }
    }

    function makeTransparent() {
        // تأثير بصري للشفافية
        preview.classList.toggle('transparent-mode');
        alert('تم تطبيق فلتر الشفافية البصري! لإزالة الخلفية تماماً برمجياً، ينصح بربط API موقع remove.bg');
    }

    function copyAll() {
        const copyText = document.getElementById("urlOutput");
        copyText.select();
        document.execCommand("copy");
        alert("تم نسخ الرابط المباشر!");
    }
</script>

</body>
</html>
