<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محلل المقامات الشرقية - النسخة الذهبية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1e2b 0%, #2d3349 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* التحكم بالميكروفون */
        .mic-control {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .mic-button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 30px;
            transition: all 0.3s;
        }

        .mic-on {
            background: #4caf50;
            color: white;
            box-shadow: 0 0 20px #4caf50;
        }

        .mic-off {
            background: #f44336;
            color: white;
        }

        .mic-status {
            font-size: 18px;
            color: #a0a8c0;
        }

        .mic-volume {
            flex: 1;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            overflow: hidden;
        }

        .volume-level {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4caf50, #ffd700);
            transition: width 0.1s;
        }

        /* باقي التصميم مثل السابق */
        .dashboard {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .radar-container {
            position: relative;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        #radarCanvas {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.3);
        }

        .current-maqam {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .maqam-name {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .note-display {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            margin: 10px 0;
        }

        .note-name {
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
        }

        .note-details {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            color: #a0a8c0;
        }

        .stability-meter {
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }

        .stability-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f44336, #4caf50);
            transition: width 0.3s;
        }

        .errors-list {
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            margin: 10px 0;
        }

        .error-item {
            padding: 10px;
            margin: 5px 0;
            background: rgba(244, 67, 54, 0.1);
            border-right: 3px solid #f44336;
            border-radius: 5px;
        }

        .voice-control {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .voice-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #ffd700;
            color: #1a1e2b;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .voice-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #ffd700;
        }

        .voice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .solfa-display {
            background: rgba(255,215,0,0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin: 10px 0;
            font-size: 24px;
            color: #ffd700;
        }

        .control-buttons {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .btn-primary, .btn-secondary {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1e2b;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin-top: 20px;
        }

        .log-container {
            max-height: 150px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .log-entry {
            padding: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #a0a8c0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; color: #ffd700; margin-bottom: 20px;">🎵 محلل المقامات الشرقية المتكامل</h1>
        
        <!-- التحكم بالميكروفون -->
        <div class="mic-control">
            <button id="micToggle" class="mic-button mic-off">🎤</button>
            <div class="mic-status" id="micStatus">الميكروفون مغلق</div>
            <div class="mic-volume">
                <div class="volume-level" id="volumeLevel"></div>
            </div>
        </div>

        <div class="dashboard">
            <!-- الرادار والمقام الحالي -->
            <div class="card">
                <div class="radar-container">
                    <canvas id="radarCanvas" width="400" height="400"></canvas>
                    <div class="current-maqam" id="currentMaqamDisplay">
                        <div class="maqam-name">راست</div>
                    </div>
                </div>
                
                <div class="note-display">
                    <div class="note-name" id="currentNote">--</div>
                    <div class="note-details">
                        <span id="currentFrequency">0 Hz</span>
                        <span id="currentCents">0 سنت</span>
                    </div>
                </div>

                <div class="stability-meter">
                    <div class="stability-fill" id="stabilityFill" style="width: 0%"></div>
                </div>
            </div>

            <!-- التحليل والأخطاء -->
            <div class="card">
                <h3 style="color: #ffd700; margin-bottom: 15px;">🔍 تحليل دقيق</h3>
                
                <div class="solfa-display" id="solfaDisplay">
                    دو - ري - مي - فا - صول - لا - سي - دو
                </div>

                <div class="voice-control">
                    <button id="voiceReportBtn" class="voice-btn">🔊 قراءة التقرير</button>
                    <button id="voiceErrorBtn" class="voice-btn">⚠️ قراءة الأخطاء</button>
                </div>

                <h4 style="color: #a0a8c0; margin: 10px 0;">الأخطاء المكتشفة:</h4>
                <div class="errors-list" id="errorsList">
                    <div class="error-item">✅ لا توجد أخطاء حتى الآن</div>
                </div>
            </div>

            <!-- التحكم والتاريخ -->
            <div class="card">
                <div class="control-buttons">
                    <button id="startBtn" class="btn-primary">▶️ بدء التحليل</button>
                    <button id="stopBtn" class="btn-secondary" disabled>⏹️ إيقاف</button>
                </div>

                <h4 style="color: #a0a8c0; margin: 10px 0;">📝 سجل النوتات:</h4>
                <div class="log-container" id="notesLog">
                    <div class="log-entry">مرحباً بك في المحلل</div>
                </div>
            </div>
        </div>

        <!-- شريط الحالة -->
        <div class="status-bar">
            <span>الحالة: <span id="statusText">الميكروفون مغلق</span></span>
            <span>المقام: <span id="statusMaqam">--</span></span>
            <span>النوتة: <span id="statusNote">--</span></span>
            <span>الدقة: <span id="statusAccuracy">0%</span></span>
        </div>
    </div>

    <script>
        // ==================== إعدادات الصوت والتحليل ====================
        class MaqamAnalyzer {
            constructor() {
                // عناصر DOM
                this.micToggle = document.getElementById('micToggle');
                this.micStatus = document.getElementById('micStatus');
                this.volumeLevel = document.getElementById('volumeLevel');
                this.startBtn = document.getElementById('startBtn');
                this.stopBtn = document.getElementById('stopBtn');
                this.voiceReportBtn = document.getElementById('voiceReportBtn');
                this.voiceErrorBtn = document.getElementById('voiceErrorBtn');
                this.currentNote = document.getElementById('currentNote');
                this.currentFrequency = document.getElementById('currentFrequency');
                this.currentCents = document.getElementById('currentCents');
                this.stabilityFill = document.getElementById('stabilityFill');
                self = this;
                this.errorsList = document.getElementById('errorsList');
                this.notesLog = document.getElementById('notesLog');
                this.statusText = document.getElementById('statusText');
                this.statusMaqam = document.getElementById('statusMaqam');
                this.statusNote = document.getElementById('statusNote');
                this.statusAccuracy = document.getElementById('statusAccuracy');
                self.solfaDisplay = document.getElementById('solfaDisplay');
                
                // متغيرات الصوت
                this.audioContext = null;
                this.analyser = null;
                this.microphone = null;
                this.isMicOn = false;
                this.isAnalyzing = false;
                this.animationFrame = null;
                
                // بيانات التحليل
                self.notesHistory = [];
                self.errors = [];
                self.currentMaqam = 'rast';
                self.lastNote = null;
                self.stability = 0;
                
                // ترددات النوتات (دو 440 هرتز)
                self.noteFrequencies = {
                    'C': 261.63, 'C#': 277.18, 'D': 293.66, 'D#': 311.13, 
                    'E': 329.63, 'F': 349.23, 'F#': 369.99, 'G': 392.00,
                    'G#': 415.30, 'A': 440.00, 'A#': 466.16, 'B': 493.88,
                    'E_half': 320.00, 'B_half': 475.00, 'E_flat': 311.13, 'B_flat': 466.16
                };
                
                // أسماء النوتات بالعربية
                self.arabicNotes = {
                    'C': 'دو', 'C#': 'دو دييز', 'D': 'ري', 'D#': 'ري دييز',
                    'E': 'مي', 'F': 'فا', 'F#': 'فا دييز', 'G': 'صول',
                    'G#': 'صول دييز', 'A': 'لا', 'A#': 'لا دييز', 'B': 'سي',
                    'E_half': 'مي (نصف بيمول)', 'B_half': 'سي (نصف بيمول)',
                    'E_flat': 'مي بيمول', 'B_flat': 'سي بيمول'
                };
                
                // السولفا
                self.solfa = ['دو', 'ري', 'مي', 'فا', 'صول', 'لا', 'سي', 'دو'];
                
                // مقامات شرقية
                self.maqamat = {
                    'rast': { name: 'راست', notes: ['C', 'D', 'E_half', 'F', 'G', 'A', 'B_half', 'C'] },
                    'bayat': { name: 'بيات', notes: ['D', 'E_half', 'F', 'G', 'A', 'B_half', 'C', 'D'] },
                    'hijaz': { name: 'حجاز', notes: ['D', 'E_half', 'F#', 'G', 'A', 'B_half', 'C', 'D'] },
                    'nahawand': { name: 'نهاوند', notes: ['C', 'D', 'E_flat', 'F', 'G', 'A', 'B_flat', 'C'] },
                    'kurd': { name: 'كرد', notes: ['D', 'E_flat', 'F', 'G', 'A', 'B_flat', 'C', 'D'] }
                };
                
                // ربط الأحداث
                this.micToggle.addEventListener('click', () => this.toggleMic());
                this.startBtn.addEventListener('click', () => this.startAnalysis());
                this.stopBtn.addEventListener('click', () => this.stopAnalysis());
                this.voiceReportBtn.addEventListener('click', () => this.speakReport());
                this.voiceErrorBtn.addEventListener('click', () => this.speakErrors());
                
                // طلب إذن الميكروفون عند البداية
                this.requestMicPermission();
            }

            // طلب إذن الميكروفون
            async requestMicPermission() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    this.addLog('✅ إذن الميكروفون متاح');
                    this.micStatus.textContent = 'الميكروفون جاهز';
                } catch (error) {
                    this.addLog('❌ لا يمكن الوصول للميكروفون');
                    this.micStatus.textContent = 'الميكروفون غير متاح';
                }
            }

            // تشغيل/إيقاف الميكروفون
            async toggleMic() {
                if (!this.isMicOn) {
                    try {
                        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        await this.audioContext.resume();
                        
                        const stream = await navigator.mediaDevices.getUserMedia({ 
                            audio: {
                                echoCancellation: false,
                                noiseSuppression: false,
                                autoGainControl: false
                            } 
                        });
                        
                        this.microphone = this.audioContext.createMediaStreamSource(stream);
                        this.analyser = this.audioContext.createAnalyser();
                        this.analyser.fftSize = 2048;
                        this.analyser.smoothingTimeConstant = 0.2;
                        
                        this.microphone.connect(this.analyser);
                        
                        this.isMicOn = true;
                        this.micToggle.className = 'mic-button mic-on';
                        this.micStatus.textContent = 'الميكروفون مفتوح';
                        this.statusText.textContent = 'الميكروفون مفتوح';
                        
                        this.addLog('🎤 تم فتح الميكروفون');
                        this.startAnalysis();
                        
                    } catch (error) {
                        this.addLog('❌ خطأ في فتح الميكروفون: ' + error.message);
                    }
                } else {
                    this.isMicOn = false;
                    this.micToggle.className = 'mic-button mic-off';
                    this.micStatus.textContent = 'الميكروفون مغلق';
                    this.statusText.textContent = 'الميكروفون مغلق';
                    
                    if (this.audioContext) {
                        await this.audioContext.close();
                    }
                    
                    this.addLog('🎤 تم إغلاق الميكروفون');
                    this.stopAnalysis();
                }
            }

            // بدء التحليل
            startAnalysis() {
                if (!this.isMicOn) {
                    alert('الرجاء فتح الميكروفون أولاً');
                    return;
                }
                
                this.isAnalyzing = true;
                this.startBtn.disabled = true;
                this.stopBtn.disabled = false;
                this.statusText.textContent = 'جاري التحليل...';
                
                this.addLog('▶️ بدء تحليل المقامات');
                this.detectPitch();
            }

            // إيقاف التحليل
            stopAnalysis() {
                this.isAnalyzing = false;
                this.startBtn.disabled = false;
                this.stopBtn.disabled = true;
                this.statusText.textContent = 'متوقف';
                
                if (this.animationFrame) {
                    cancelAnimationFrame(this.animationFrame);
                }
                
                this.addLog('⏹️ إيقاف التحليل');
            }

            // كشف التردد
            detectPitch() {
                if (!this.isAnalyzing || !this.analyser) return;

                const buffer = new Float32Array(this.analyser.fftSize);
                this.analyser.getFloatTimeDomainData(buffer);
                
                // حساب مستوى الصوت
                let sum = 0;
                for (let i = 0; i < buffer.length; i++) {
                    sum += Math.abs(buffer[i]);
                }
                const volume = sum / buffer.length;
                this.volumeLevel.style.width = (volume * 200) + '%';
                
                // كشف التردد
                const frequency = this.yinPitchDetection(buffer);
                
                if (frequency > 80 && frequency < 1000) {
                    this.processFrequency(frequency);
                }
                
                this.animationFrame = requestAnimationFrame(() => this.detectPitch());
            }

            // خوارزمية YIN لكشف التردد
            yinPitchDetection(buffer) {
                const sampleRate = this.audioContext.sampleRate;
                const threshold = 0.1;
                
                let tauEstimate = -1;
                let previousDifference = Infinity;
                
                for (let tau = 5; tau < buffer.length / 4; tau++) {
                    let difference = 0;
                    
                    for (let i = 0; i < buffer.length / 4; i++) {
                        if (i + tau < buffer.length) {
                            const delta = buffer[i] - buffer[i + tau];
                            difference += delta * delta;
                        }
                    }
                    
                    difference = difference / tau;
                    
                    if (tau > 5 && difference < threshold && previousDifference > difference) {
                        tauEstimate = tau;
                        break;
                    }
