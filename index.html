<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العفوية تتصل بك</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #000; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            font-family: 'Arial', sans-serif; 
            color: white; 
        }
        .main-container { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
        }
        .profile-img { 
            width: 85%; 
            max-width: 450px; 
            border-radius: 30px; 
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.2); 
            margin-bottom: 20px; 
        }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer;
        }
        .btn-call {
            width: 90px; height: 90px; background: #4cd964; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 45px;
            margin-bottom: 20px; animation: pulse 1s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
        h1 { font-size: 2.2rem; margin-bottom: 10px; }
        .calling { color: #4cd964; font-size: 1.2rem; }
    </style>
</head>

    <div id="overlay" onclick="startCall()">

    <audio id="ringtone" loop>
        <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=" type="audio/wav">
    </audio>

    <script>
        function startCall() {
            const audio = document.getElementById('ringtone');
            // هنا يمكنك وضع رابط ملفك الصوتي المرفوع إذا أردت الأغنية كاملة
            audio.src = "music.m4a"; 
            audio.play().catch(e => console.log("بانتظار ملف الصوت..."));
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
