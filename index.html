<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محلل المقامات الشرقية - النسخة المصلحة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: linear-gradient(135deg, #1a1e2b 0%, #2d3349 100%); color: #fff; padding: 20px; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; }
        .main-header { background: rgba(255,215,0,0.1); border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; border: 2px solid #ffd700; }
        .mic-section { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px; border: 2px solid #ffd700; }
        .mic-button { width: 80px; height: 80px; border-radius: 50%; border: none; font-size: 40px; cursor: pointer; transition: 0.3s; }
        .mic-off { background: #f44336; color: white; }
        .mic-on { background: #4caf50; color: white; box-shadow: 0 0 20px #4caf50; }
        .volume-meter { flex: 1; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; }
        .volume-bar-bg { height: 20px; background: #444; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .volume-bar-fill { height: 100%; width: 0%; background: #4caf50; transition: width 0.1s; }
        .control-panel { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 2px solid #ffd700; }
        .control-buttons { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
        .control-btn { padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; opacity: 0.5; }
        .control-btn:enabled { opacity: 1; }
        .btn-green { background: #4caf50; color: white; }
        .btn-red { background: #f44336; color: white; }
        .btn-gold { background: #ffd700; color: black; }
        .note-display { background: #2d3349; padding: 40px; border-radius: 20px; text-align: center; border: 2px solid #ffd700; margin-bottom: 20px; }
        #noteName { font-size: 80px; color: #ffd700; font-weight: bold; }
        .history-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-header">
        <h1>🎵 محلل النغمات الذكي</h1>
        <p>قم بفتح الميكروفون أولاً ثم ابدأ التحليل</p>
    </div>

    <div class="mic-section">
        <button id="micBtn" class="mic-button mic-off">🎤</button>
        <div class="volume-meter">
            <span>مستوى الصوت: <span id="volNum">0%</span></span>
            <div class="volume-bar-bg"><div id="volFill" class="volume-bar-fill"></div></div>
        </div>
    </div>

    <div class="control-panel">
        <div class="control-buttons">
            <button id="startBtn" class="control-btn btn-green" disabled>▶️ بدء التحليل</button>
            <button id="stopBtn" class="control-btn btn-red" disabled>⏹️ إيقاف</button>
            <button id="reportBtn" class="control-btn btn-gold" disabled>🔊 التقرير</button>
        </div>
    </div>

    <div class="note-display">
        <div id="noteName">--</div>
        <div id="noteFreq">0 Hz</div>
    </div>

    <div class="history-box" id="history">
        <div>سجل النوتات سيظهر هنا...</div>
    </div>
</div>

<script>
    let audioCtx, analyser, source, animationId;
    let isAnalyzing = false;
    let detectedNotes = [];

    const micBtn = document.getElementById('micBtn');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const reportBtn = document.getElementById('reportBtn');
    const noteNameDiv = document.getElementById('noteName');
    const noteFreqDiv = document.getElementById('noteFreq');

    // 1. تشغيل الميكروفون (الخطوة الأساسية)
    micBtn.onclick = async () => {
        if (!audioCtx) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // إنشاء السياق الصوتي بعد ضغط المستخدم مباشرة
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);

                micBtn.classList.replace('mic-off', 'mic-on');
                startBtn.disabled = false;
                updateVolume(); // البدء بمراقبة مستوى الصوت
                console.log("تم تفعيل الميكروفون");
            } catch (err) {
                alert("خطأ: يرجى السماح للمتصفح بالوصول للميكروفون.");
            }
        } else {
            location.reload(); // إعادة التحميل لإغلاق الميكروفون
        }
    };

    // 2. تحديث مستوى الصوت
    function updateVolume() {
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        let sum = 0;
        for(let i=0; i<data.length; i++) sum += data[i];
        let avg = Math.round((sum / data.length) * 2);
        
        document.getElementById('volFill').style.width = avg + "%";
        document.getElementById('volNum').innerText = avg + "%";
        requestAnimationFrame(updateVolume);
    }

    // 3. بدء التحليل
    startBtn.onclick = () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        isAnalyzing = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        reportBtn.disabled = false;
        detectPitch();
    };

    // 4. إيقاف التحليل
    stopBtn.onclick = () => {
        isAnalyzing = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        noteNameDiv.innerText = "--";
    };

    // 5. خوارزمية كشف النغمة
    function detectPitch() {
        if (!isAnalyzing) return;

        const buffer = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(buffer);

        let pitch = getPitch(buffer, audioCtx.sampleRate);
        
        if (pitch !== -1 && pitch > 50 && pitch < 1000) {
            let note = freqToNote(pitch);
            noteNameDiv.innerText = note;
            noteFreqDiv.innerText = Math.round(pitch) + " Hz";
            if (!detectedNotes.includes(note)) detectedNotes.push(note);
            addToHistory(note);
        }

        requestAnimationFrame(detectPitch);
    }

    function getPitch(buffer, sampleRate) {
        let sum = 0;
        for (let i = 0; i < buffer.length; i++) sum += buffer[i] * buffer[i];
        if (Math.sqrt(sum / buffer.length) < 0.02) return -1;

        let bestOffset = -1;
        let bestCorrelation = 0;
        for (let offset = 0; offset < buffer.length / 2; offset++) {
            let correlation = 0;
            for (let i = 0; i < buffer.length / 2; i++) {
                correlation += Math.abs(buffer[i] - buffer[i + offset]);
            }
            correlation = 1 - (correlation / (buffer.length / 2));
            if (correlation > bestCorrelation) {
                bestCorrelation = correlation;
                bestOffset = offset;
            }
        }
        return (bestCorrelation > 0.8) ? (sampleRate / bestOffset) : -1;
    }

    function freqToNote(f) {
        const notes = ["دو", "دو#", "ري", "ري#", "مي", "فا", "فا#", "صول", "صول#", "لا", "لا#", "سي"];
        let i = Math.round(12 * (Math.log(f / 440) / Math.log(2))) + 69;
        return notes[i % 12];
    }

    function addToHistory(n) {
        const h = document.getElementById('history');
        if (h.children.length > 5) h.lastChild.remove();
        let div = document.createElement('div');
        div.innerText = "تم رصد: " + n;
        h.prepend(div);
    }

    // 6. قراءة التقرير بالصوت
    reportBtn.onclick = () => {
        let text = "التقرير جاهز. تم رصد النوتات التالية خلال عزفك: " + detectedNotes.join(" و ");
        if (detectedNotes.length === 0) text = "لم يتم رصد نوتات واضحة، حاول العزف بقوة أكبر.";
        
        let speech = new SpeechSynthesisUtterance(text);
        speech.lang = 'ar-SA';
        window.speechSynthesis.speak(speech);
    };
</script>

</body>
</html>
