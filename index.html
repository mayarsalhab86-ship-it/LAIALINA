<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محاكي إنفاق ثروة إيلون - نسخة الصور</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: white; text-align: center; padding: 20px; margin: 0; }
        .header { background: #f39c12; color: #000; padding: 25px; position: sticky; top: 0; font-size: 2.2em; z-index: 100; box-shadow: 0 5px 20px rgba(0,0,0,0.8); font-weight: bold; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin: 40px auto; max-width: 1200px; padding: 0 20px; }
        .item { background: #1e1e1e; border-radius: 20px; overflow: hidden; border: 1px solid #333; transition: 0.3s; display: flex; flex-direction: column; }
        .item:hover { transform: translateY(-10px); border-color: #f39c12; box-shadow: 0 10px 20px rgba(243, 156, 18, 0.2); }
        .item img { width: 100%; height: 180px; object-fit: cover; background: #2c3e50; }
        .item-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .item h3 { font-size: 1.2em; margin: 0 0 10px 0; color: #fff; }
        .item p { color: #2ecc71; font-size: 1.4em; font-weight: bold; margin: 0 0 15px 0; }
        button { background: #e74c3c; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 1.1em; font-weight: bold; width: 100%; transition: 0.2s; }
        button:hover { background: #c0392b; }
        button:active { transform: scale(0.95); }
        .counter { font-family: monospace; }
    </style>
</head>
<body>

    <div class="header">
        الرصيد المتبقي: $<span id="balance" class="counter">817,000,000,000</span>
    </div>

    <div class="container" id="items-container">
        </div>

    <script>
        let balance = 817000000000;
        
        const items = [
            // تكنولوجيا
            { name: "كرت شاشة RTX 5090", price: 2500, img: "https://images.unsplash.com/photo-1591488320449-011701bb6704?auto=format&fit=crop&w=400&q=80" },
            { name: "سيرفر ذكاء اصطناعي عملاق", price: 500000, img: "https://images.unsplash.com/photo-1558494949-ef010cbdcc51?auto=format&fit=crop&w=400&q=80" },
            { name: "iPhone 17 Pro Max", price: 1600, img: "https://images.unsplash.com/photo-1678911820864-e2c567c655d7?auto=format&fit=crop&w=400&q=80" },
            { name: "نظارة Apple Vision Pro", price: 3500, img: "https://images.unsplash.com/photo-1696446701796-da61225697cc?auto=format&fit=crop&w=400&q=80" },
            
            // سيارات
            { name: "لامبورغيني ريفويلتو", price: 600000, img: "https://images.unsplash.com/photo-1544636331-e26879cd4d9b?auto=format&fit=crop&w=400&q=80" },
            { name: "بوغاتي شيرون", price: 3000000, img: "https://images.unsplash.com/photo-1627454819213-f7724a697ce7?auto=format&fit=crop&w=400&q=80" },
            { name: "تسلا سايبر تراك", price: 100000, img: "https://images.unsplash.com/photo-1614239031023-e69f8d103328?auto=format&fit=crop&w=400&q=80" },
            { name: "فراري أحمر", price: 400000, img: "https://images.unsplash.com/photo-1592198084033-aade902d1aae?auto=format&fit=crop&w=400&q=80" },
            
            // طيران ويخوت
            { name: "طائرة جولف ستريم الخاصة", price: 75000000, img: "https://images.unsplash.com/photo-1540962351504-03099e0a754b?auto=format&fit=crop&w=400&q=80" },
            { name: "يخت سوبر فخم", price: 500000000, img: "https://images.unsplash.com/photo-1567899378494-47b22a2ae96a?auto=format&fit=crop&w=400&q=80" },
            
            // جنون المليارات
            { name: "جزيرة استوائية", price: 150000000, img: "https://images.unsplash.com/photo-1559128010-7c1ad6e1b6a5?auto=format&fit=crop&w=400&q=80" },
            { name: "ناطحة سحاب كاملة", price: 2000000000, img: "https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&w=400&q=80" },
            { name: "صاروخ SpaceX فالكون", price: 67000000, img: "https://images.unsplash.com/photo-1517976487492-5750f3195933?auto=format&fit=crop&w=400&q=80" },
            { name: "مدينة ملاهي ضخمة", price: 800000000, img: "https://images.unsplash.com/photo-1505155485761-f09205c9bc75?auto=format&fit=crop&w=400&q=80" }
        ];

        const container = document.getElementById('items-container');
        const balanceEl = document.getElementById('balance');

        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <img src="${item.img}" alt="${item.name}">
                <div class="item-info">
                    <h3>${item.name}</h3>
                    <p>$${item.price.toLocaleString()}</p>
                    <button onclick="buy(${item.price})">اشتري الآن</button>
                </div>
            `;
            container.appendChild(div);
        });

        function buy(price) {
            if (balance >= price) {
                balance -= price;
                balanceEl.innerText = balance.toLocaleString();
            } else {
                alert("للأسف.. انتهت ثروة إيلون ماسك!");
            }
        }
    </script>
</body>
</html>
