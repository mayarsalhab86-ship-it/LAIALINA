<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>عمر سلهب تاسع - بيجاوب على كل شي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0b2b26, #1a4a3a);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            max-width: 550px;
            width: 100%;
            border-radius: 60px 60px 80px 80px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
            text-align: center;
            padding: 30px 25px 40px;
            transition: 0.2s;
        }
        h1 {
            font-size: 2.1rem;
            background: #f3b33d;
            display: inline-block;
            padding: 5px 25px;
            border-radius: 60px;
            color: #1e2f2a;
            margin-bottom: 10px;
        }
        .badge {
            background: #000;
            color: gold;
            padding: 6px 15px;
            border-radius: 60px;
            width: fit-content;
            margin: 10px auto;
            font-weight: bold;
        }
        .avatar {
            font-size: 5rem;
            margin: 15px 0;
        }
        input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1rem;
            border: 3px solid #f3b33d;
            border-radius: 70px;
            text-align: right;
            font-family: inherit;
            outline: none;
            margin: 20px 0 10px;
        }
        button {
            background: #f3b33d;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 5px;
            color: #2d2b1f;
        }
        button:hover {
            background: #e09d1e;
            transform: scale(0.97);
        }
        .answer-area {
            background: #eef3ef;
            border-radius: 45px;
            margin-top: 30px;
            padding: 18px;
        }
        .answer-label {
            color: #b45f06;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .answer {
            font-size: 1.9rem;
            font-weight: 800;
            color: #145c3b;
            background: white;
            padding: 18px 12px;
            border-radius: 50px;
            margin-top: 12px;
            word-break: break-word;
            letter-spacing: 1px;
        }
        footer {
            margin-top: 20px;
            font-size: 12px;
            color: #4f6f5e;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="avatar">🧃😎</div>
    <h1>عمر سلهب</h1>
    <div class="badge">تاسع - إجابات رسمية</div>
    <p style="margin: 15px 0 5px;">اسأل أي سؤال .. الجواب واحد فقط</p>

    <input type="text" id="questionInput" placeholder="مثال: شو رح يصير بعد ١٠٠ سنة؟ أو ليش السماء زرقاء؟" autocomplete="off">
    <button id="askBtn">اسأل عمر سلهب 🔥</button>

    <div class="answer-area">
        <div class="answer-label">📢 جواب عمر سلهب (تاسع) لأي سؤال:</div>
        <div class="answer" id="answerBox">عمر سلهب تاسع</div>
    </div>
    <footer>⚠️ مهما كان سؤالك .. الجواب ثابت وواضح</footer>
</div>

<script>
    const inputField = document.getElementById('questionInput');
    const askButton = document.getElementById('askBtn');
    const answerBox = document.getElementById('answerBox');

    function answerAlwaysOmar() {
        let userQuestion = inputField.value.trim();
        if (userQuestion === "") {
            answerBox.innerText = "عمر سلهب تاسع (اكتب سؤالاً أولاً)";
        } else {
            answerBox.innerText = "عمر سلهب تاسع";
        }
        // effect
        answerBox.style.transform = "scale(1.02)";
        setTimeout(() => { answerBox.style.transform = "scale(1)"; }, 120);
    }

    askButton.addEventListener('click', answerAlwaysOmar);
    inputField.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            answerAlwaysOmar();
        }
    });

    // لما يفتح الصفحة يكون الجواب جاهز
    answerBox.innerText = "عمر سلهب تاسع";
</script>
</body>
</html>
