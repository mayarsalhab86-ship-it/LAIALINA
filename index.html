    <meta charset="UTF-8">

    <title>العفوية تتصل بك</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #050505;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            overflow: hidden;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        /* تصميم الصورة لتكون واضحة وكبيرة */
        .caller-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 30px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5), 0 0 20px rgba(255,255,255,0.1);
            margin-bottom: 25px;
            border: 2px solid rgba(255,255,255,0.05);
        }
        h1 { font-size: 2.2rem; margin-bottom: 5px; }
        p { color: #4cd964; font-size: 1.2rem; font-weight: bold; }
        
        /* شاشة الرد الوهمية لضمان عمل الصوت */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .btn-call {
            width: 90px;
            height: 90px;
            background: #4cd964;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(76, 217, 100, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(76, 217, 100, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(76, 217, 100, 0); }
        }
    </style>
</head>
