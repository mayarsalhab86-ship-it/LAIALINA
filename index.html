<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>روضة الرشا 🌈</title>
<style>
body {
    font-family: "Comic Sans MS", cursive;
    background: linear-gradient(to right, #ffecd2, #fcb69f);
    text-align: center;
    direction: rtl;
}

h1 {
    color: #ff4081;
}

.menu button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 15px;
    background: #4caf50;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

.section {
    display: none;
}

.active {
    display: block;
}

#board {
    display: grid;
    grid-template-columns: repeat(10, 40px);
    gap: 2px;
    justify-content: center;
    margin-top: 20px;
}

.cell {
    width: 40px;
    height: 40px;
    background: #fff;
    border: 1px solid #ccc;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.player {
    background: yellow;
}

button.play {
    background: #ff9800;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>🌸 روضة الرشا 🌸</h1>

<div class="menu">
    <button onclick="showSection('home')">الرئيسية</button>
    <button onclick="showSection('games')">🎮 ألعاب</button>
</div>

<div id="home" class="section active">
    <h2>أهلاً بكم يا أطفال 💖</h2>
    <p>هنا نتعلم ونلعب معاً 🌈</p>
</div>

<div id="games" class="section">
    <h2>🎲 لعبة السلم والثعبان</h2>
    <div id="board"></div>
    <button class="play" onclick="rollDice()">ارمي النرد 🎲</button>
    <p id="status"></p>
</div>

<script>
// التنقل بين الصفحات
function showSection(id) {
    document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// إنشاء اللوحة
const board = document.getElementById("board");
for (let i = 100; i >= 1; i--) {
    let cell = document.createElement("div");
    cell.className = "cell";
    cell.id = "cell-" + i;
    cell.innerText = i;
    board.appendChild(cell);
}

// اللاعب
let position = 1;

// سلالم وثعابين
const ladders = {
    4: 14,
    9: 31,
    28: 84
};

const snakes = {
    17: 7,
    54: 34,
    62: 19,
    98: 79
};

function rollDice() {
    let dice = Math.floor(Math.random() * 6) + 1;
    position += dice;

    if (position > 100) position = 100;

    if (ladders[position]) {
        position = ladders[position];
        alert("طلعت سلم 😄");
    }

    if (snakes[position]) {
        position = snakes[position];
        alert("عضك ثعبان 😢");
    }

    document.querySelectorAll('.cell').forEach(c => c.classList.remove('player'));
    document.getElementById("cell-" + position).classList.add('player');

    document.getElementById("status").innerText = "الموقع الحالي: " + position;

    if (position === 100) {
        alert("🎉 فزت!");
        position = 1;
    }
}
</script>

</body>
</html>
