
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول النوتة - دو ري مي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 40px;
            padding: 40px;
            max-width: 1200px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
        }
        
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 30px;
            color: #0f172a;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }
        
        .tab {
            padding: 15px 40px;
            background: #f1f5f9;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2em;
        }
        
        .tab.active {
            background: #0f172a;
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .input-area {
            background: #f8fafc;
            border-radius: 30px;
            padding: 30px;
            border: 2px solid #e2e8f0;
        }
        
        textarea {
            width: 100%;
            height: 150px;
            padding: 20px;
            font-size: 1.2em;
            border: 2px solid #cbd5e1;
            border-radius: 20px;
            margin: 15px 0;
            direction: ltr;
            font-family: 'Courier New', monospace;
        }
        
        .upload-box {
            border: 3px dashed #6d28d9;
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            background: white;
            cursor: pointer;
            margin: 20px 0;
            font-size: 1.2em;
        }
        
        .upload-box:hover {
            background: #f3e8ff;
        }
        
        .upload-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        
        #imageInput {
            display: none;
        }
        
        .preview-container {
            text-align: center;
            margin: 20px 0;
        }
        
        #imagePreview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
        }
        
        .convert-btn {
            background: linear-gradient(135deg, #0f172a, #6d28d9);
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 50px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 20px 0;
        }
        
        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px #6d28d9;
        }
        
        .options {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        select {
            padding: 12px;
            border: 2px solid #cbd5e1;
            border-radius: 15px;
            width: 100%;
            font-size: 1em;
        }
        
        .result-section {
            background: #f8fafc;
            border-radius: 30px;
            padding: 30px;
            margin-top: 30px;
        }
        
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .note-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 2px solid #e2e8f0;
        }
        
        .scientific {
            color: #6d28d9;
            font-size: 1.2em;
            font-weight: bold;
        }
        
        .arabic {
            font-size: 1.8em;
            font-weight: bold;
            color: #0f172a;
            margin: 10px 0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        
        th {
            background: #0f172a;
            color: white;
            padding: 15px;
        }
        
        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 دو - ري - مي - فا - صول - لا - سي</h1>
        
        <!-- التبويبات -->
        <div class="tabs">
            <div class="tab active" onclick="showTab('text')">📝 نص</div>
            <div class="tab" onclick="showTab('image')">🖼️ صورة</div>
        </div>
        
        <!-- قسم النص -->
        <div id="tabText" class="tab-content active">
            <div class="input-area">
                <h2>أدخل النوتات:</h2>
                <textarea id="noteInput" placeholder="مثال: C4 D4 E4 F4 G4 A4 B4 C5">C4 D4 E4 F4 G4 A4 B4 C5</textarea>
                <button class="convert-btn" onclick="convertText()">🔄 حول</button>
            </div>
        </div>
        
        <!-- قسم الصورة (مضبوط 100%) -->
        <div id="tabImage" class="tab-content">
            <div class="input-area">
                <h2>ارفع صورة النوتة:</h2>
                
                <!-- صندوق الرفع -->
                <div class="upload-box" onclick="document.getElementById('imageInput').click()">
                    <div class="upload-icon">📸</div>
                    <div>اضغط هنا لاختيار صورة</div>
                    <div style="font-size: 0.9em; color: #666; margin-top: 10px;">PNG, JPG, GIF</div>
                </div>
                
                <!-- input مخفي -->
                <input type="file" id="imageInput" accept="image/*">
                
                <!-- معاينة الصورة -->
                <div class="preview-container">
                    <img id="imagePreview" src="#" alt="معاينة">
                </div>
                
                <!-- رسالة تأكيد -->
                <div id="uploadMessage" style="color: #6d28d9; text-align: center; margin: 10px 0;"></div>
                
                <!-- زر التحويل -->
                <button class="convert-btn" id="convertImageBtn" onclick="convertImage()">🔍 استخرج النوتات</button>
            </div>
        </div>
        
        <!-- الخيارات -->
        <div class="options">
            <div style="flex: 1;">
                <label>نظام التسمية:</label>
                <select id="naming">
                    <option value="full">عربي كامل (دو دييز)</option>
                    <option value="symbol">بالرموز (دو #)</option>
                    <option value="english">إنجليزي (C#)</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label>العرض:</label>
                <select id="display">
                    <option value="grid">شبكة</option>
                    <option value="table">جدول</option>
                </select>
            </div>
        </div>
        
        <!-- النتيجة -->
        <div class="result-section" id="resultSection">
            <h2 style="margin-bottom: 20px;">📝 النتيجة:</h2>
            <div id="resultDisplay"></div>
        </div>
    </div>
    
    <script>
        // قاموس التحويل
        const notesMap = {
            'C': 'دو', 'D': 'ري', 'E': 'مي', 'F': 'فا', 'G': 'صول', 'A': 'لا', 'B': 'سي'
        };
        
        // عناصر
        const noteInput = document.getElementById('noteInput');
        const namingSelect = document.getElementById('naming');
        const displaySelect = document.getElementById('display');
        const resultDisplay = document.getElementById('resultDisplay');
        
        // ========== تبويبات ==========
        window.showTab = function(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'text') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('tabText').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('tabImage').classList.add('active');
            }
        };
        
        // ========== رفع الصورة (مضبوط) ==========
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const uploadMessage = document.getElementById('uploadMessage');
        const convertImageBtn = document.getElementById('convertImageBtn');
        
        // عند اختيار ملف
        imageInput.addEventListener('change', function(e) {
            console.log('تم اختيار ملف:', this.files[0]);
            
            if (this.files && this.files[0]) {
                const file = this.files[0];
                
                // تحقق من النوع
                if (!file.type.startsWith('image/')) {
                    alert('❌ هذا ليس ملف صورة!');
                    return;
                }
                
                // عرض الصورة
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                    uploadMessage.innerHTML = '✅ تم رفع الصورة: ' + file.name;
                };
                reader.readAsDataURL(file);
            }
        });
        
        // ========== تحويل الصورة ==========
        window.convertImage = function() {
            // نوتات افتراضية للعرض
            const dummyNotes = ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5', 'C#4', 'D#4', 'F#4', 'G#4'];
            
            const naming = namingSelect.value;
            const display = displaySelect.value;
            
            // تحويل النوتات
            const converted = dummyNotes.map(note => {
                const letter = note[0];
                const accidental = note.includes('#') ? '#' : note.includes('b') ? 'b' : '';
                const octave = note.match(/\d+/)[0];
                
                let arabic = notesMap[letter];
                if (accidental === '#') arabic += naming === 'full' ? ' دييز' : naming === 'symbol' ? ' #' : '#';
                if (accidental === 'b') arabic += naming === 'full' ? ' بيمول' : naming === 'symbol' ? ' ♭' : 'b';
                
                return { scientific: note, arabic, letter, octave };
            });
            
            // عرض النتيجة
            showResult(converted, display);
        };
        
        // ========== تحويل النص ==========
        window.convertText = function() {
            const text = noteInput.value;
            const pattern = /[A-G][#b]?\d+/g;
            const notes = text.match(pattern) || [];
            
            const naming = namingSelect.value;
            const display = displaySelect.value;
            
            const converted = notes.map(note => {
                const letter = note[0];
                const accidental = note.includes('#') ? '#' : note.includes('b') ? 'b' : '';
                const octave = note.match(/\d+/)[0];
                
                let arabic = notesMap[letter];
                if (accidental === '#') arabic += naming === 'full' ? ' دييز' : naming === 'symbol' ? ' #' : '#';
                if (accidental === 'b') arabic += naming === 'full' ? ' بيمول' : naming === 'symbol' ? ' ♭' : 'b';
                
                return { scientific: note, arabic, letter, octave };
            });
            
            showResult(converted, display);
        };
        
        // ========== عرض النتيجة ==========
        function showResult(notes, displayType) {
            if (notes.length === 0) {
                resultDisplay.innerHTML = '<p style="color: red; text-align: center;">لا توجد نوتات</p>';
                return;
            }
            
            if (displayType === 'grid') {
                let html = '<div class="notes-grid">';
                notes.forEach(note => {
                    html += `
                        <div class="note-card">
                            <div class="scientific">${note.scientific}</div>
                            <div style="font-size: 1.5em; color: #94a3b8;">⬇️</div>
                            <div class="arabic">${note.arabic}</div>
                            <div style="color: #64748b;">${note.octave}</div>
                        </div>
                    `;
                });
                html += '</div>';
                resultDisplay.innerHTML = html;
            } else {
                let html = '<table><tr><th>علمي</th><th>حرفي</th><th>الأوكتاف</th></tr>';
                notes.forEach(note => {
                    html += `
                        <tr>
                            <td><strong>${note.scientific}</strong></td>
                            <td style="color: #6d28d9; font-weight: bold; font-size: 1.2em;">${note.arabic}</td>
                            <td>${note.octave}</td>
                        </tr>
                    `;
                });
                html += '</table>';
                resultDisplay.innerHTML = html;
            }
        }
        
        // تشغيل أول مرة
        window.onload = function() {
            convertText();
        };
    </script>
</body>
</html>
